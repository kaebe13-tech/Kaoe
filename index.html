<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000010">
    <title>NEON DRIFT — Cyberpunk Endless Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           RESET & GLOBALS
           ============================================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000008;
            color: #ffffff;
            font-family: 'Rajdhani', 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* ============================================================
           SCANLINES + VIGNETTE
           ============================================================ */
        #scanlines {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 200, 220, 0.02) 0px,
                rgba(0, 200, 220, 0.02) 1px,
                transparent 1px,
                transparent 3px
            );
            mix-blend-mode: overlay;
        }

        #vignette {
            position: fixed;
            inset: 0;
            z-index: 6;
            pointer-events: none;
            background: radial-gradient(ellipse at center,
                transparent 40%,
                rgba(0, 0, 10, 0.75) 100%);
        }

        /* Time-stop blue tint overlay */
        #timestop-overlay {
            position: fixed;
            inset: 0;
            z-index: 7;
            pointer-events: none;
            background: radial-gradient(ellipse at center,
                rgba(0, 100, 255, 0.08),
                rgba(0, 50, 200, 0.25));
            opacity: 0;
            transition: opacity 0.3s;
            mix-blend-mode: screen;
        }

        #timestop-overlay.active { opacity: 1; }

        /* Glitch tint overlay */
        #glitch-overlay {
            position: fixed;
            inset: 0;
            z-index: 7;
            pointer-events: none;
            background: linear-gradient(
                90deg,
                rgba(255, 0, 100, 0.05),
                rgba(0, 255, 200, 0.05),
                rgba(255, 0, 100, 0.05));
            opacity: 0;
            transition: opacity 0.2s;
        }

        #glitch-overlay.active { opacity: 1; animation: glitchShift 0.15s infinite; }

        @keyframes glitchShift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, 2px); }
        }

        /* ============================================================
           HUD
           ============================================================ */
        #hud {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .hud-panel {
            background: linear-gradient(135deg,
                rgba(0, 200, 220, 0.05),
                rgba(200, 0, 200, 0.05));
            border: 1px solid rgba(0, 200, 220, 0.35);
            border-radius: 4px;
            padding: 8px 16px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow:
                0 0 12px rgba(0, 200, 220, 0.12),
                inset 0 0 8px rgba(0, 200, 220, 0.06);
            font-family: 'Orbitron', monospace;
        }

        .hud-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: #6dd5e3;
            opacity: 0.8;
        }

        .hud-value {
            font-size: 24px;
            font-weight: 900;
            color: #e8f8ff;
            text-shadow: 0 0 6px rgba(0, 200, 220, 0.5);
            letter-spacing: 2px;
            line-height: 1;
            margin-top: 4px;
        }

        #hud-right .hud-value {
            color: #ffd866;
            text-shadow: 0 0 6px rgba(255, 180, 0, 0.4);
        }

        #hud-speed .hud-value {
            color: #d987d9;
            text-shadow: 0 0 6px rgba(220, 100, 220, 0.4);
        }

        #hud-left, #hud-right {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Power-up timer (center top) */
        #powerup-display {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
            pointer-events: none;
            display: none;
            flex-direction: column;
            align-items: center;
            font-family: 'Orbitron', monospace;
        }

        #powerup-display.show { display: flex; }

        .powerup-label {
            font-size: 13px;
            letter-spacing: 5px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .powerup-bar {
            width: 240px;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .powerup-fill {
            height: 100%;
            width: 100%;
            transition: width 0.05s linear;
        }

        #powerup-display.timestop .powerup-label {
            color: #6db3ff;
            text-shadow: 0 0 8px #4080ff;
        }
        #powerup-display.timestop .powerup-fill {
            background: linear-gradient(90deg, #4080ff, #80c0ff);
            box-shadow: 0 0 10px #4080ff;
        }

        #powerup-display.glitch .powerup-label {
            color: #ff66cc;
            text-shadow: 0 0 8px #ff00aa;
        }
        #powerup-display.glitch .powerup-fill {
            background: linear-gradient(90deg, #ff00aa, #00ffaa, #ff00aa);
            background-size: 200% 100%;
            animation: glitchBar 0.4s linear infinite;
            box-shadow: 0 0 10px #ff00aa;
        }

        @keyframes glitchBar {
            0%, 100% { background-position: 0% 0; }
            50% { background-position: 100% 0; }
        }

        /* ============================================================
           OVERLAYS (MENU / GAME OVER)
           ============================================================ */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center,
                rgba(15, 0, 30, 0.85),
                rgba(0, 0, 8, 0.95));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.4s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(48px, 10vw, 120px);
            letter-spacing: 8px;
            background: linear-gradient(90deg, #6dd5e3, #c876c8, #6dd5e3);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .overlay-sub {
            font-family: 'Orbitron', monospace;
            font-size: clamp(11px, 1.4vw, 16px);
            letter-spacing: 5px;
            color: #6dd5e3;
            margin-bottom: 32px;
            opacity: 0.7;
        }

        .overlay-stats {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            font-family: 'Orbitron', monospace;
        }

        .stat-block { text-align: center; }

        .stat-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: #6dd5e3;
            opacity: 0.7;
        }

        .stat-value {
            font-size: clamp(28px, 4.5vw, 48px);
            font-weight: 900;
            color: #e8f8ff;
            text-shadow: 0 0 8px rgba(0, 200, 220, 0.4);
            margin-top: 6px;
        }

        .neon-btn {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: clamp(14px, 1.8vw, 18px);
            letter-spacing: 4px;
            padding: 14px 48px;
            background: transparent;
            color: #e8f8ff;
            border: 1.5px solid rgba(0, 200, 220, 0.7);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-shadow: 0 0 6px rgba(0, 200, 220, 0.5);
            box-shadow:
                0 0 12px rgba(0, 200, 220, 0.25),
                inset 0 0 12px rgba(0, 200, 220, 0.08);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
        }

        .neon-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(0, 200, 220, 0.25),
                transparent);
            transition: left 0.5s ease;
        }

        .neon-btn:hover {
            background: rgba(0, 200, 220, 0.08);
            box-shadow:
                0 0 18px rgba(0, 200, 220, 0.5),
                inset 0 0 18px rgba(0, 200, 220, 0.15);
            transform: translateY(-2px);
            border-color: rgba(200, 100, 200, 0.8);
        }

        .neon-btn:hover::before { left: 100%; }
        .neon-btn:active { transform: translateY(0); }

        /* ============================================================
           CONTROLS HELP
           ============================================================ */
        .controls-hint {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Rajdhani', monospace;
            font-size: 12px;
            letter-spacing: 2.5px;
            color: rgba(180, 220, 230, 0.55);
            text-align: center;
            line-height: 1.9;
            max-width: 90%;
        }

        .key {
            display: inline-block;
            padding: 1px 8px;
            border: 1px solid rgba(0, 200, 220, 0.4);
            border-radius: 3px;
            background: rgba(0, 200, 220, 0.05);
            color: #c8e8f0;
            margin: 0 1px;
            font-weight: 700;
            font-size: 11px;
        }

        .powerup-legend {
            display: flex;
            gap: 30px;
            margin-top: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .legend-icon {
            width: 14px;
            height: 14px;
            transform: rotate(45deg);
            border-radius: 2px;
        }

        .legend-icon.timestop { background: #4080ff; box-shadow: 0 0 8px #4080ff; }
        .legend-icon.glitch   { background: #ff00aa; box-shadow: 0 0 8px #ff00aa; }
        .legend-icon.token    { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }

        /* ============================================================
           COMBO + NOTIFICATION POPUPS
           ============================================================ */
        #combo-popup, #powerup-popup {
            position: fixed;
            top: 28%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            z-index: 20;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 4px;
            text-align: center;
            line-height: 1.3;
        }

        #combo-popup {
            font-size: 40px;
            color: #ffd866;
            text-shadow: 0 0 8px rgba(255, 180, 0, 0.6);
        }

        #powerup-popup {
            font-size: 28px;
        }

        #combo-popup.show, #powerup-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ============================================================
           LOADER
           ============================================================ */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000008;
            transition: opacity 0.6s;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loader-text {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            letter-spacing: 6px;
            color: #6dd5e3;
            margin-top: 18px;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .loader-bar {
            width: 220px;
            height: 2px;
            background: rgba(0, 200, 220, 0.15);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -40%;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #6dd5e3, transparent);
            animation: load 1.2s linear infinite;
        }

        @keyframes load {
            0%   { left: -40%; }
            100% { left: 100%; }
        }

        @media (max-width: 640px) {
            #hud { padding: 12px; }
            .hud-value { font-size: 18px; }
            .hud-label { font-size: 9px; letter-spacing: 2px; }
            .controls-hint { font-size: 10px; }
            .powerup-legend { gap: 14px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div id="timestop-overlay"></div>
    <div id="glitch-overlay"></div>

    <!-- HUD -->
    <div id="hud" class="hidden">
        <div id="hud-left">
            <div class="hud-panel">
                <div class="hud-label">DISTANCE</div>
                <div class="hud-value"><span id="score-value">0</span> M</div>
            </div>
            <div class="hud-panel" id="hud-speed">
                <div class="hud-label">VELOCITY</div>
                <div class="hud-value"><span id="speed-value">0</span></div>
            </div>
        </div>
        <div id="hud-right">
            <div class="hud-panel">
                <div class="hud-label">DATA SHARDS</div>
                <div class="hud-value"><span id="token-value">0</span></div>
            </div>
            <div class="hud-panel">
                <div class="hud-label">BEST</div>
                <div class="hud-value"><span id="best-score">0</span></div>
            </div>
        </div>
    </div>

    <!-- Power-up active timer -->
    <div id="powerup-display">
        <div class="powerup-label" id="powerup-label">TIME STOP</div>
        <div class="powerup-bar">
            <div class="powerup-fill" id="powerup-fill"></div>
        </div>
    </div>

    <div id="combo-popup"></div>
    <div id="powerup-popup"></div>

    <!-- START MENU -->
    <div id="start-menu" class="overlay">
        <div class="overlay-title">NEON DRIFT</div>
        <div class="overlay-sub">// CYBERPUNK GRID PROTOCOL</div>
        <div class="overlay-stats">
            <div class="stat-block">
                <div class="stat-label">PERSONAL BEST</div>
                <div class="stat-value"><span id="best-score-menu">0</span></div>
            </div>
        </div>
        <button id="play-btn" class="neon-btn">JACK IN</button>
        <div class="controls-hint">
            <span class="key">A</span> <span class="key">←</span>
            <span class="key">D</span> <span class="key">→</span> &nbsp; LANE SHIFT &nbsp;|&nbsp;
            <span class="key">W</span> <span class="key">↑</span> <span class="key">SPACE</span> &nbsp; JUMP
            <div class="powerup-legend">
                <div class="legend-item"><div class="legend-icon token"></div> SHARD</div>
                <div class="legend-item"><div class="legend-icon timestop"></div> TIME STOP</div>
                <div class="legend-item"><div class="legend-icon glitch"></div> GLITCH PHASE</div>
            </div>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over" class="overlay hidden">
        <div class="overlay-title" style="font-size: clamp(36px, 7vw, 84px);">SYSTEM CRASH</div>
        <div class="overlay-sub">// CONNECTION TERMINATED</div>
        <div class="overlay-stats">
            <div class="stat-block">
                <div class="stat-label">DISTANCE</div>
                <div class="stat-value"><span id="final-score">0</span></div>
            </div>
            <div class="stat-block">
                <div class="stat-label">SHARDS</div>
                <div class="stat-value"><span id="final-tokens">0</span></div>
            </div>
            <div class="stat-block">
                <div class="stat-label">BEST</div>
                <div class="stat-value"><span id="final-best">0</span></div>
            </div>
        </div>
        <button id="retry-btn" class="neon-btn">RECONNECT</button>
    </div>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-bar"></div>
        <div id="loader-text">INITIALIZING GRID...</div>
    </div>

    <!-- IMPORT MAP -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GlitchPass }       from 'three/addons/postprocessing/GlitchPass.js';
    import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

    /* ================================================================
       CONFIG
       ================================================================ */
    const CONFIG = {
        LANES:               [-2.5, 0, 2.5],
        GROUND_Y:            0.6,
        SEGMENT_LENGTH:      30,
        SEGMENT_COUNT:       8,

        JUMP_VELOCITY:       9.0,
        GRAVITY:             22.0,
        LANE_LERP_SPEED:     16.0,

        BASE_SPEED:          16.0,
        MAX_SPEED:           42.0,
        SPEED_GAIN_PER_SEC:  0.45,

        SPAWN_AHEAD:         110,
        DESPAWN_BEHIND:      18,
        OBSTACLE_SPACING_BASE: 16,
        OBSTACLE_SPACING_MIN:  7,
        OBSTACLE_SPACING_DECAY: 0.18,
        TOKEN_SPACING_MIN:   8,
        TOKEN_SPACING_MAX:   16,

        // Power-ups (rare drops)
        POWERUP_SPACING_MIN: 35,
        POWERUP_SPACING_MAX: 60,
        TIMESTOP_DURATION:   4.0,    // seconds frozen
        GLITCH_DURATION:     3.5,    // seconds invincible

        CAMERA_LERP:         5.5,
        SHAKE_DECAY:         6.0,
        FOV_BASE:            72,
        FOV_SPEED_BOOST:     8,

        PARTICLE_POOL_SIZE:  120,

        DISTANCE_MULT:       1.0,
        TOKEN_VALUE:         50,
    };

    const STATE = Object.freeze({
        START_MENU: 'START_MENU',
        PLAYING:    'PLAYING',
        GAME_OVER:  'GAME_OVER',
        RESET:      'RESET',
    });

    const POWERUP_TYPE = Object.freeze({
        TIMESTOP: 'TIMESTOP',
        GLITCH:   'GLITCH',
    });

    const tmpVec  = new THREE.Vector3();
    const tmpVec2 = new THREE.Vector3();

    /* ================================================================
       GAME
       ================================================================ */
    class NeonDriftGame {
        constructor() {
            this.state = STATE.START_MENU;
            this.score = 0;
            this.tokens = 0;
            this.combo = 0;
            this.comboTimer = 0;
            this.bestScore = parseInt(localStorage.getItem('neonDriftBest') || '0', 10);
            this.speed = CONFIG.BASE_SPEED;
            this.elapsed = 0;
            this.shakeIntensity = 0;
            this.fovTarget = CONFIG.FOV_BASE;

            // Power-up state
            this.activePowerup = null;        // 'TIMESTOP' | 'GLITCH' | null
            this.powerupTimer  = 0;
            this.powerupDuration = 0;
            this.glitchTriggerTimer = 0;      // momentary glitch on death

            this.clock = new THREE.Clock();
            this.scene = null;
            this.camera = null;
            this.renderer = null;
            this.composer = null;

            this.pathSegments = [];
            this.cityGroup = null;
            this.dirLight = null;
            this.playerLight = null;
            this.accentLight = null;

            this.player = null;
            this.playerBody = null;
            this.playerCore = null;
            this.playerBox = new THREE.Box3();
            this.playerState = {
                currentLane: 1,
                targetX: CONFIG.LANES[1],
                velocityY: 0,
                isGrounded: true,
            };

            this.obstacles = [];
            this.tokensArr = [];
            this.powerups = [];
            this.particlePool = [];
            this.lastObstacleZ = 0;
            this.lastTokenZ = 0;
            this.lastPowerupZ = 0;

            this.cameraLookAt = new THREE.Vector3();

            this.init();
        }

        init() {
            this.initRenderer();
            this.initScene();
            this.initLighting();
            this.initPostProcessing();
            this.initWorld();
            this.initPlayer();
            this.initParticles();
            this.initInput();
            this.initUI();
            this.prewarmSpawns();
            this.onResize();

            requestAnimationFrame(() => {
                document.getElementById('loader').classList.add('hidden');
                this.clock.start();
                this.animate();
            });
        }

        initRenderer() {
            this.renderer = new THREE.WebGLRenderer({
                antialias: true,
                powerPreference: 'high-performance',
                stencil: false,
            });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
            // Reduced exposure for darker, less blown-out look
            this.renderer.toneMappingExposure = 0.65;
            this.renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.getElementById('canvas-container').appendChild(this.renderer.domElement);
            window.addEventListener('resize', () => this.onResize(), { passive: true });
        }

        initScene() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x020108);
            // Closer fog for moodier atmosphere
            this.scene.fog = new THREE.Fog(0x040210, 22, 78);

            this.camera = new THREE.PerspectiveCamera(
                CONFIG.FOV_BASE,
                window.innerWidth / window.innerHeight,
                0.1,
                250
            );
            this.camera.position.set(0, 4.6, 7.5);
            this.cameraLookAt.set(0, 1, -10);
            this.camera.lookAt(this.cameraLookAt);
        }

        initLighting() {
            // Lower ambient for darker base
            const ambient = new THREE.AmbientLight(0x141428, 0.4);
            this.scene.add(ambient);

            const hemi = new THREE.HemisphereLight(0x2a2a55, 0x080018, 0.25);
            this.scene.add(hemi);

            // Cooler, dimmer directional
            this.dirLight = new THREE.DirectionalLight(0x8090b8, 0.55);
            this.dirLight.position.set(8, 18, 6);
            this.dirLight.castShadow = true;
            this.dirLight.shadow.mapSize.set(1024, 1024);
            const sc = this.dirLight.shadow.camera;
            sc.left = -14; sc.right = 14;
            sc.top = 14;   sc.bottom = -14;
            sc.near = 1;   sc.far = 50;
            this.dirLight.shadow.bias = -0.0008;
            this.dirLight.shadow.normalBias = 0.02;
            this.scene.add(this.dirLight);
            this.scene.add(this.dirLight.target);

            // Player follow light - dimmer
            this.playerLight = new THREE.PointLight(0x00ccdd, 1.8, 14, 1.6);
            this.playerLight.position.set(0, 2.4, 0);
            this.scene.add(this.playerLight);

            // Accent light - dimmer
            this.accentLight = new THREE.PointLight(0xcc00cc, 1.2, 22, 1.4);
            this.accentLight.position.set(0, 3, -18);
            this.scene.add(this.accentLight);
        }

        initPostProcessing() {
            this.composer = new EffectComposer(this.renderer);
            this.composer.setSize(window.innerWidth, window.innerHeight);
            this.composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            this.composer.addPass(new RenderPass(this.scene, this.camera));

            // Much subtler bloom - only the brightest neon should glow
            this.bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.45,   // strength (was 0.95)
                0.4,    // radius
                0.55    // threshold (was 0.18 - now only very bright pixels glow)
            );
            this.composer.addPass(this.bloomPass);

            // Glitch pass - disabled by default, toggled on power-up / death
            this.glitchPass = new GlitchPass();
            this.glitchPass.enabled = false;
            this.glitchPass.goWild = false;
            this.composer.addPass(this.glitchPass);

            this.composer.addPass(new OutputPass());
        }

        /* ============================================================
           WORLD
           ============================================================ */
        initWorld() {
            for (let i = 0; i < CONFIG.SEGMENT_COUNT; i++) {
                const seg = this.createPathSegment();
                seg.position.z = -i * CONFIG.SEGMENT_LENGTH + CONFIG.SEGMENT_LENGTH;
                this.pathSegments.push(seg);
                this.scene.add(seg);
            }

            this.cityGroup = new THREE.Group();
            for (let i = 0; i < 80; i++) {
                const w = 2 + Math.random() * 4;
                const h = 6 + Math.random() * 28;
                const d = 2 + Math.random() * 4;
                const side = (i % 2 === 0) ? -1 : 1;
                const colors = [0x880055, 0x005566, 0x550088, 0x003355];
                const color = colors[Math.floor(Math.random() * colors.length)];

                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x030308,
                    emissive: color,
                    // MUCH dimmer buildings - they're far background
                    emissiveIntensity: 0.12 + Math.random() * 0.18,
                    metalness: 0.85,
                    roughness: 0.55,
                });
                const building = new THREE.Mesh(geo, mat);
                building.position.set(
                    side * (15 + Math.random() * 25),
                    h / 2 - 1,
                    -i * 8 - Math.random() * 12
                );
                this.cityGroup.add(building);
            }
            this.scene.add(this.cityGroup);

            const farFloor = new THREE.Mesh(
                new THREE.PlaneGeometry(400, 400),
                new THREE.MeshStandardMaterial({
                    color: 0x010108,
                    metalness: 0.6,
                    roughness: 0.95,
                })
            );
            farFloor.rotation.x = -Math.PI / 2;
            farFloor.position.y = -1.2;
            farFloor.receiveShadow = true;
            this.scene.add(farFloor);
        }

        createPathSegment() {
            const group = new THREE.Group();

            const pathMat = new THREE.MeshStandardMaterial({
                color: 0x06061a,
                emissive: 0x05052a,
                emissiveIntensity: 0.15,
                metalness: 0.7,
                roughness: 0.4,
            });
            const path = new THREE.Mesh(
                new THREE.PlaneGeometry(10, CONFIG.SEGMENT_LENGTH),
                pathMat
            );
            path.rotation.x = -Math.PI / 2;
            path.receiveShadow = true;
            group.add(path);

            // Edge strips - dimmer
            const edgeMat = new THREE.MeshStandardMaterial({
                color: 0x00aacc,
                emissive: 0x00aacc,
                emissiveIntensity: 1.4,   // was 2.8
            });
            for (const side of [-1, 1]) {
                const edge = new THREE.Mesh(
                    new THREE.BoxGeometry(0.15, 0.1, CONFIG.SEGMENT_LENGTH),
                    edgeMat
                );
                edge.position.set(side * 4.95, 0.05, 0);
                group.add(edge);
            }

            // Lane dashes
            const dashMat = new THREE.MeshStandardMaterial({
                color: 0xaa00aa,
                emissive: 0xaa00aa,
                emissiveIntensity: 0.9,   // was 1.8
            });
            const dashCount = Math.floor(CONFIG.SEGMENT_LENGTH / 3);
            for (const lane of [-1, 1]) {
                for (let i = 0; i < dashCount; i++) {
                    const dash = new THREE.Mesh(
                        new THREE.BoxGeometry(0.08, 0.04, 1.4),
                        dashMat
                    );
                    dash.position.set(
                        lane * 1.25,
                        0.04,
                        -CONFIG.SEGMENT_LENGTH / 2 + i * 3 + 1
                    );
                    group.add(dash);
                }
            }

            // Pylons + rings (much dimmer)
            const pylonMat = new THREE.MeshStandardMaterial({
                color: 0x0c0c1a,
                emissive: 0x220033,
                emissiveIntensity: 0.3,
                metalness: 0.9,
                roughness: 0.25,
            });
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0x00aacc,
                emissive: 0x00aacc,
                emissiveIntensity: 1.3,    // was 2.5
            });
            const pylonCount = Math.floor(CONFIG.SEGMENT_LENGTH / 6);
            for (const side of [-1, 1]) {
                for (let i = 0; i < pylonCount; i++) {
                    const z = -CONFIG.SEGMENT_LENGTH / 2 + i * 6 + 3;

                    const pylon = new THREE.Mesh(
                        new THREE.BoxGeometry(0.3, 4, 0.3),
                        pylonMat
                    );
                    pylon.position.set(side * 5.5, 1.8, z);
                    pylon.castShadow = true;
                    group.add(pylon);

                    const ring = new THREE.Mesh(
                        new THREE.TorusGeometry(0.45, 0.07, 8, 16),
                        ringMat
                    );
                    ring.position.set(side * 5.5, 3.85, z);
                    ring.rotation.x = Math.PI / 2;
                    group.add(ring);
                }
            }

            return group;
        }

        /* ============================================================
           PLAYER
           ============================================================ */
        initPlayer() {
            const playerGroup = new THREE.Group();

            const bodyGeo = new THREE.OctahedronGeometry(0.65, 0);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x00bbcc,
                emissive: 0x00bbcc,
                emissiveIntensity: 0.7,    // was 1.4

                roughness: 0.1,

            });

            const coreGeo = new THREE.SphereGeometry(0.22, 16, 16);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0xddffff });
            const core = new THREE.Mesh(coreGeo, coreMat);
            playerGroup.add(core);
            this.playerCore = core;

            const wingMat = new THREE.MeshStandardMaterial({
                color: 0xaa00aa,

        /* ============================================================
           PARTICLES
           ============================================================ */
        initParticles() {
            const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
            for (let i = 0; i < CONFIG.PARTICLE_POOL_SIZE; i++) {
                const mat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: 0xffffff,
                    emissiveIntensity: 1.2,    // was 2.5
                    transparent: true,
                    opacity: 1,
                });
                const p = new THREE.Mesh(geo, mat);
                p.visible = false;
                p.userData = {
                    active: false,
                    velocity: new THREE.Vector3(),
                    life: 0,
                    maxLife: 1,
                };
                this.scene.add(p);
                this.particlePool.push(p);
            }
        }

        spawnParticles(position, hexColor, count = 10, speed = 5) {
            let spawned = 0;
            for (const p of this.particlePool) {
                if (spawned >= count) break;
                if (p.userData.active) continue;

                p.position.copy(position);
                p.userData.velocity.set(
                    (Math.random() - 0.5) * speed,
                    Math.random() * speed * 0.9 + 1,
                    (Math.random() - 0.5) * speed
                );
                p.userData.life = 0;
                p.userData.maxLife = 0.55 + Math.random() * 0.5;
                p.userData.active = true;
                p.material.color.setHex(hexColor);
                p.material.emissive.setHex(hexColor);
                p.material.opacity = 1;
                p.scale.set(1, 1, 1);
                p.visible = true;
                spawned++;
            }
        }

        updateParticles(dt) {
            for (const p of this.particlePool) {
                if (!p.userData.active) continue;
                p.userData.life += dt;
                if (p.userData.life >= p.userData.maxLife) {
                    p.userData.active = false;
                    p.visible = false;
                    continue;
                }
                const t = p.userData.life / p.userData.maxLife;
                p.position.addScaledVector(p.userData.velocity, dt);
                p.userData.velocity.y -= 9 * dt;
                p.material.opacity = 1 - t;
                const s = 1 - t * 0.5;
                p.scale.set(s, s, s);
            }
        }

        /* ============================================================
           INPUT
           ============================================================ */
        initInput() {
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if (this.state === STATE.START_MENU) {
                    if (k === 'enter' || k === ' ') { this.startGame(); e.preventDefault(); }
                    return;
                }
                if (this.state === STATE.GAME_OVER) {
                    if (k === 'enter' || k === 'r' || k === ' ') { this.resetGame(); e.preventDefault(); }
                    return;
                }
                if (this.state !== STATE.PLAYING) return;

                if (k === 'arrowleft'  || k === 'a') { this.shiftLane(-1); e.preventDefault(); }
                else if (k === 'arrowright' || k === 'd') { this.shiftLane(1);  e.preventDefault(); }
                else if (k === 'arrowup'    || k === 'w' || k === ' ') { this.jump(); e.preventDefault(); }
            });

            let touchStart = null;
            window.addEventListener('touchstart', (e) => {
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }, { passive: true });

            window.addEventListener('touchend', (e) => {
                if (!touchStart) return;
                const dx = e.changedTouches[0].clientX - touchStart.x;
                const dy = e.changedTouches[0].clientY - touchStart.y;
                touchStart = null;

                if (this.state === STATE.START_MENU) { this.startGame(); return; }
                if (this.state === STATE.GAME_OVER)  { this.resetGame(); return; }
                if (this.state !== STATE.PLAYING)    return;

                const absX = Math.abs(dx), absY = Math.abs(dy);
                const T = 28;
                if (absX < T && absY < T) this.jump();
                else if (absX > absY) (dx > 0) ? this.shiftLane(1) : this.shiftLane(-1);
                else if (dy < -T) this.jump();
            }, { passive: true });
        }

        initUI() {
            document.getElementById('play-btn').addEventListener('click', () => this.startGame());
            document.getElementById('retry-btn').addEventListener('click', () => this.resetGame());
            document.getElementById('best-score').textContent     = this.bestScore;
            document.getElementById('best-score-menu').textContent = this.bestScore;
        }

        shiftLane(dir) {
            const newLane = Math.max(0, Math.min(2, this.playerState.currentLane + dir));
            if (newLane === this.playerState.currentLane) return;
            this.playerState.currentLane = newLane;
            this.playerState.targetX = CONFIG.LANES[newLane];
            this.fovTarget = CONFIG.FOV_BASE + 4;
        }

        jump() {
            if (!this.playerState.isGrounded) return;
            this.playerState.velocityY = CONFIG.JUMP_VELOCITY;
            this.playerState.isGrounded = false;
            this.spawnParticles(
                tmpVec.set(this.player.position.x, 0.05, this.player.position.z),
                0x00ccdd, 8, 4
            );
        }

        /* ============================================================
           STATE TRANSITIONS
           ============================================================ */
        startGame() {
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            this.state = STATE.PLAYING;
            this.elapsed = 0;
        }

        gameOver() {
            // Glitch effect doubles as "shield" — if active, no death
            if (this.activePowerup === POWERUP_TYPE.GLITCH) return;

            this.state = STATE.GAME_OVER;
            const finalScore = Math.floor(this.score);
            if (finalScore > this.bestScore) {
                this.bestScore = finalScore;
                localStorage.setItem('neonDriftBest', String(finalScore));
            }
            document.getElementById('final-score').textContent  = finalScore;
            document.getElementById('final-tokens').textContent = this.tokens;
            document.getElementById('final-best').textContent   = this.bestScore;
            document.getElementById('best-score').textContent   = this.bestScore;
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('game-over').classList.remove('hidden');

            this.shakeIntensity = 1.4;
            this.glitchTriggerTimer = 0.6;       // brief glitch effect on death
            this.glitchPass.enabled = true;
            this.glitchPass.goWild = true;

            this.spawnParticles(this.player.position.clone(), 0xff2244, 35, 9);
            this.spawnParticles(this.player.position.clone(), 0xff8800, 18, 6);
        }

        resetGame() {
            this.state = STATE.RESET;

            for (const o of this.obstacles) this.scene.remove(o.mesh);
            this.obstacles.length = 0;
            for (const t of this.tokensArr) this.scene.remove(t.mesh);
            this.tokensArr.length = 0;
            for (const p of this.powerups) this.scene.remove(p.mesh);
            this.powerups.length = 0;
            for (const p of this.particlePool) {
                p.userData.active = false;
                p.visible = false;
            }

            this.score = 0;
            this.tokens = 0;
            this.combo = 0;
            this.comboTimer = 0;
            this.elapsed = 0;
            this.speed = CONFIG.BASE_SPEED;
            this.shakeIntensity = 0;
            this.fovTarget = CONFIG.FOV_BASE;

            this.deactivatePowerup();
            this.glitchTriggerTimer = 0;
            this.glitchPass.enabled = false;
            this.glitchPass.goWild = false;

            this.playerState.currentLane = 1;
            this.playerState.targetX = CONFIG.LANES[1];
            this.playerState.velocityY = 0;
            this.playerState.isGrounded = true;
            this.player.position.set(0, CONFIG.GROUND_Y, 0);
            this.playerBody.rotation.set(0, 0, 0);

            for (let i = 0; i < this.pathSegments.length; i++) {
                this.pathSegments[i].position.z = -i * CONFIG.SEGMENT_LENGTH + CONFIG.SEGMENT_LENGTH;
            }

            this.prewarmSpawns();

            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            this.state = STATE.PLAYING;
        }

        /* ============================================================
           SPAWNING
           ============================================================ */
        prewarmSpawns() {
            this.lastObstacleZ = -22;
            this.lastTokenZ = -14;
            this.lastPowerupZ = -45;     // first power-up further out
            const targetZ = this.player ? this.player.position.z - CONFIG.SPAWN_AHEAD : -CONFIG.SPAWN_AHEAD;
            while (this.lastObstacleZ > targetZ) this.advanceObstacleSpawn();
            while (this.lastTokenZ    > targetZ) this.advanceTokenSpawn();
            while (this.lastPowerupZ  > targetZ) this.advancePowerupSpawn();
        }

        advanceObstacleSpawn() {
            const spacing = Math.max(
                CONFIG.OBSTACLE_SPACING_MIN,
                CONFIG.OBSTACLE_SPACING_BASE - this.elapsed * CONFIG.OBSTACLE_SPACING_DECAY
            );
            this.lastObstacleZ -= spacing;
            this.spawnObstacleRow(this.lastObstacleZ);
        }

        advanceTokenSpawn() {
            const spacing = CONFIG.TOKEN_SPACING_MIN +
                Math.random() * (CONFIG.TOKEN_SPACING_MAX - CONFIG.TOKEN_SPACING_MIN);
            this.lastTokenZ -= spacing;
            this.spawnTokenGroup(this.lastTokenZ);
        }

        advancePowerupSpawn() {
            const spacing = CONFIG.POWERUP_SPACING_MIN +
                Math.random() * (CONFIG.POWERUP_SPACING_MAX - CONFIG.POWERUP_SPACING_MIN);
            this.lastPowerupZ -= spacing;
            this.spawnPowerup(this.lastPowerupZ);
        }

        spawnObstacleRow(z) {
            const blockCount = Math.random() < 0.6 ? 1 : 2;
            const lanes = [0, 1, 2];
            for (let i = lanes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [lanes[i], lanes[j]] = [lanes[j], lanes[i]];
            }
            const blocked = lanes.slice(0, blockCount);

            for (const lane of blocked) {
                const r = Math.random();
                let obs;
                if (r < 0.4)       obs = this.createBarrier(lane, z);
                else if (r < 0.75) obs = this.createHurdle(lane, z);
                else               obs = this.createLaser(lane, z);
                this.obstacles.push(obs);
                this.scene.add(obs.mesh);
            }
        }

        createBarrier(lane, z) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.3, 2.0, 0.6),
                new THREE.MeshStandardMaterial({
                    color: 0x0a0203,
                    emissive: 0xcc1133,
                    emissiveIntensity: 0.65,    // was 1.4
                    metalness: 0.9,
                    roughness: 0.25,
                })
            );
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            const strip = new THREE.Mesh(
                new THREE.BoxGeometry(1.4, 0.08, 0.7),
                new THREE.MeshStandardMaterial({
                    color: 0xff2244,
                    emissive: 0xff2244,
                    emissiveIntensity: 1.8,    // was 3.5
                })
            );
            strip.position.y = 1.05;
            group.add(strip);

            const stripeMat = new THREE.MeshStandardMaterial({
                color: 0xcc7700,
                emissive: 0xcc7700,
                emissiveIntensity: 0.75,
            });
            for (let i = -1; i <= 1; i++) {
                const stripe = new THREE.Mesh(
                    new THREE.BoxGeometry(1.32, 0.2, 0.04),
                    stripeMat
                );
                stripe.position.set(0, i * 0.5 + 0.2, 0.31);
                group.add(stripe);
            }

            group.position.set(CONFIG.LANES[lane], 1.0, z);
            return {
                mesh: group, type: 'barrier', lane,
                box: new THREE.Box3(),
                size: new THREE.Vector3(1.3, 2.0, 0.6),
                offset: new THREE.Vector3(0, 0, 0),
            };
        }

        createHurdle(lane, z) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.5, 0.35),
                new THREE.MeshStandardMaterial({
                    color: 0x080604,
                    emissive: 0xcc7700,
                    emissiveIntensity: 0.6,
                    metalness: 0.85,
                    roughness: 0.3,
                })
            );
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            const strip = new THREE.Mesh(
                new THREE.BoxGeometry(1.55, 0.08, 0.4),
                new THREE.MeshStandardMaterial({
                    color: 0xffaa00,
                    emissive: 0xffaa00,
                    emissiveIntensity: 1.8,
                })
            );
            strip.position.y = 0.28;
            group.add(strip);

            group.position.set(CONFIG.LANES[lane], 0.25, z);
            return {
                mesh: group, type: 'hurdle', lane,
                box: new THREE.Box3(),
                size: new THREE.Vector3(1.5, 0.5, 0.35),
                offset: new THREE.Vector3(0, 0, 0),
            };
        }

        createLaser(lane, z) {
            const group = new THREE.Group();

            const pylonMat = new THREE.MeshStandardMaterial({
                color: 0x111122,
                emissive: 0x220033,
                emissiveIntensity: 0.3,
                metalness: 0.9,
                roughness: 0.25,
            });
            for (const s of [-1, 1]) {
                const py = new THREE.Mesh(
                    new THREE.BoxGeometry(0.16, 1.6, 0.16),
                    pylonMat
                );
                py.position.set(s * 0.6, 0.8, 0);
                py.castShadow = true;
                group.add(py);
            }

            const beam = new THREE.Mesh(
                new THREE.BoxGeometry(1.1, 0.18, 0.18),
                new THREE.MeshStandardMaterial({
                    color: 0xff00aa,
                    emissive: 0xff00aa,
                    emissiveIntensity: 2.2,    // was 4.5
                })
            );
            beam.position.y = 1.15;
            group.add(beam);

            const halo = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.4, 0.4),
                new THREE.MeshBasicMaterial({
                    color: 0xff00aa,
                    transparent: true,
                    opacity: 0.1,
                })
            );
            halo.position.y = 1.15;
            group.add(halo);

            group.position.set(CONFIG.LANES[lane], 0, z);
            return {
                mesh: group, type: 'laser', lane,
                box: new THREE.Box3(),
                size:   new THREE.Vector3(1.1, 0.4, 0.5),
                offset: new THREE.Vector3(0, 1.15, 0),
            };
        }

        /* === Tokens === */
        spawnTokenGroup(z) {
            const pattern = Math.random();
            if (pattern < 0.4) {
                const lane = Math.floor(Math.random() * 3);
                for (let i = 0; i < 5; i++) this.addToken(CONFIG.LANES[lane], 1.0, z - i * 1.6);
            } else if (pattern < 0.7) {
                const lane = Math.floor(Math.random() * 3);
                for (let i = 0; i < 6; i++) {
                    const t = i / 5;
                    const y = 0.6 + Math.sin(t * Math.PI) * 1.7;
                    this.addToken(CONFIG.LANES[lane], y, z - i * 1.4);
                }
            } else {
                const dir = Math.random() < 0.5 ? 1 : -1;
                const startLane = dir > 0 ? 0 : 2;
                for (let i = 0; i < 3; i++) {
                    this.addToken(CONFIG.LANES[startLane + dir * i], 1.0, z - i * 2.6);
                }
            }
        }

        addToken(x, y, z) {
            const m = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.32, 0),
                new THREE.MeshStandardMaterial({
                    color: 0xffaa00,
                    emissive: 0xffaa00,
                    emissiveIntensity: 1.0,    // was 2.2
                    metalness: 1,
                    roughness: 0.1,
                })
            );
            m.position.set(x, y, z);
            this.scene.add(m);
            this.tokensArr.push({
                mesh: m,
                box: new THREE.Box3(),
                collected: false,
                collectAnim: 0,
                baseY: y,
                phase: Math.random() * Math.PI * 2,
            });
        }

        /* === Power-ups === */
        spawnPowerup(z) {
            // 50/50 between time-stop and glitch
            const type = Math.random() < 0.5 ? POWERUP_TYPE.TIMESTOP : POWERUP_TYPE.GLITCH;
            const lane = Math.floor(Math.random() * 3);

            const group = new THREE.Group();

            const isTimestop = type === POWERUP_TYPE.TIMESTOP;
            const color = isTimestop ? 0x4080ff : 0xff00aa;

            // Outer crystal — bigger & rotates
            const outer = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.5, 0),
                new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 1.2,
                    metalness: 1,
                    roughness: 0.1,
                    transparent: true,
                    opacity: 0.85,
                })
            );
            outer.scale.set(1, 1.3, 1);
            group.add(outer);

            // Inner core
            const inner = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.22, 0),
                new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                })
            );
            group.add(inner);

            // Rotating ring
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.7, 0.04, 8, 24),
                new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 1.5,
                })
            );
            ring.rotation.x = Math.PI / 2;
            group.add(ring);

            // Point light to make them pop without bloom blowout
            const light = new THREE.PointLight(color, 1.0, 6, 1.5);
            group.add(light);

            group.position.set(CONFIG.LANES[lane], 1.2, z);
            this.scene.add(group);

            this.powerups.push({
                mesh: group,
                outer, inner, ring, light,
                box: new THREE.Box3(),
                collected: false,
                collectAnim: 0,
                baseY: 1.2,
                phase: Math.random() * Math.PI * 2,
                type,
                color,
            });
        }

        activatePowerup(type) {
            this.activePowerup = type;
            this.powerupTimer = (type === POWERUP_TYPE.TIMESTOP)
                ? CONFIG.TIMESTOP_DURATION
                : CONFIG.GLITCH_DURATION;
            this.powerupDuration = this.powerupTimer;

            const display = document.getElementById('powerup-display');
            const label   = document.getElementById('powerup-label');
            const fill    = document.getElementById('powerup-fill');

            display.classList.remove('timestop', 'glitch');
            display.classList.add('show');

            if (type === POWERUP_TYPE.TIMESTOP) {
                display.classList.add('timestop');
                label.textContent = 'TIME STOP';
                document.getElementById('timestop-overlay').classList.add('active');
                this.showPowerupPopup('TIME STOP', '#80c0ff');
            } else {
                display.classList.add('glitch');
                label.textContent = 'GLITCH PHASE';
                document.getElementById('glitch-overlay').classList.add('active');
                this.glitchPass.enabled = true;
                this.glitchPass.goWild = false;
                this.showPowerupPopup('GLITCH PHASE', '#ff66cc');
            }
            fill.style.width = '100%';
        }

        deactivatePowerup() {
            this.activePowerup = null;
            this.powerupTimer = 0;
            this.powerupDuration = 0;

            document.getElementById('powerup-display').classList.remove('show');
            document.getElementById('timestop-overlay').classList.remove('active');
            document.getElementById('glitch-overlay').classList.remove('active');

            // Don't disable glitch pass if death-glitch is still running
            if (this.glitchTriggerTimer <= 0) {
                this.glitchPass.enabled = false;
                this.glitchPass.goWild = false;
            }
        }

        showPowerupPopup(text, color) {
            const el = document.getElementById('powerup-popup');
            el.textContent = text;
            el.style.color = color;
            el.style.textShadow = `0 0 12px ${color}`;
            el.classList.remove('show');
            void el.offsetWidth;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 900);
        }

        /* ============================================================
           UPDATE
           ============================================================ */
        updatePlayer(dt) {
            const dx = this.playerState.targetX - this.player.position.x;
            const k = 1 - Math.exp(-CONFIG.LANE_LERP_SPEED * dt);
            this.player.position.x += dx * k;

            const tiltTarget = -dx * 0.25;
            this.playerBody.rotation.z += (tiltTarget - this.playerBody.rotation.z) * (1 - Math.exp(-12 * dt));
            this.playerBody.rotation.y += dt * 2.2;

            if (!this.playerState.isGrounded) {
                this.playerState.velocityY -= CONFIG.GRAVITY * dt;
                this.player.position.y     += this.playerState.velocityY * dt;
                if (this.player.position.y <= CONFIG.GROUND_Y) {
                    this.player.position.y = CONFIG.GROUND_Y;
                    this.playerState.velocityY = 0;
                    this.playerState.isGrounded = true;
                    this.spawnParticles(
                        tmpVec.set(this.player.position.x, 0.05, this.player.position.z),
                        0x00ccdd, 6, 3
                    );
                }
            }

            this.player.position.z -= this.speed * dt;

            // Glitch power-up: player visually flickers
            if (this.activePowerup === POWERUP_TYPE.GLITCH) {
                this.playerBody.material.opacity = 0.4 + Math.random() * 0.55;
                this.playerBody.material.emissive.setHex(Math.random() < 0.5 ? 0xff00aa : 0x00ffaa);
            } else {
                this.playerBody.material.opacity = 1;
                this.playerBody.material.emissive.setHex(0x00bbcc);
            }

            this.playerBox.setFromCenterAndSize(
                this.player.position,
                tmpVec.set(0.85, 1.1, 0.85)
            );
        }

        updateSpawning(dt) {
            while (this.player.position.z - this.lastObstacleZ < CONFIG.SPAWN_AHEAD) this.advanceObstacleSpawn();
            while (this.player.position.z - this.lastTokenZ    < CONFIG.SPAWN_AHEAD) this.advanceTokenSpawn();
            while (this.player.position.z - this.lastPowerupZ  < CONFIG.SPAWN_AHEAD) this.advancePowerupSpawn();
        }

        updateObstacles(dt) {
            for (let i = this.obstacles.length - 1; i >= 0; i--) {
                const o = this.obstacles[i];
                if (o.mesh.position.z > this.player.position.z + CONFIG.DESPAWN_BEHIND) {
                    this.scene.remove(o.mesh);
                    this.obstacles.splice(i, 1);
                }
            }
            for (const o of this.obstacles) {
                tmpVec.copy(o.mesh.position).add(o.offset);
                o.box.setFromCenterAndSize(tmpVec, o.size);
            }
        }

        updateTokens(dt) {
            for (let i = this.tokensArr.length - 1; i >= 0; i--) {
                const t = this.tokensArr[i];
                t.mesh.rotation.y += dt * 3.2;
                t.mesh.rotation.x += dt * 1.6;
                t.phase += dt * 4.5;

                if (t.collected) {
                    t.collectAnim += dt * 6;
                    const s = Math.max(0, 1 - t.collectAnim);
                    t.mesh.scale.setScalar(s);
                    t.mesh.position.y += dt * 4;
                    if (t.collectAnim >= 1) {
                        this.scene.remove(t.mesh);
                        this.tokensArr.splice(i, 1);
                        continue;
                    }
                } else {
                    t.mesh.position.y = t.baseY + Math.sin(t.phase) * 0.12;
                }

                if (!t.collected && t.mesh.position.z > this.player.position.z + CONFIG.DESPAWN_BEHIND) {
                    this.scene.remove(t.mesh);
                    this.tokensArr.splice(i, 1);
                    continue;
                }

                if (!t.collected) {
                    t.box.setFromCenterAndSize(t.mesh.position, tmpVec.set(0.9, 0.9, 0.9));
                }
            }
        }

        updatePowerups(dt) {
            // Active timer countdown
            if (this.activePowerup) {
                this.powerupTimer -= dt;
                const pct = Math.max(0, this.powerupTimer / this.powerupDuration);
                document.getElementById('powerup-fill').style.width = (pct * 100) + '%';
                if (this.powerupTimer <= 0) this.deactivatePowerup();
            }

            // Animate + collision
            for (let i = this.powerups.length - 1; i >= 0; i--) {
                const p = this.powerups[i];
                p.outer.rotation.y += dt * 2.2;
                p.outer.rotation.x += dt * 1.4;
                p.ring.rotation.z  += dt * 3;
                p.phase += dt * 3;

                if (p.collected) {
                    p.collectAnim += dt * 6;
                    const s = Math.max(0, 1 - p.collectAnim);
                    p.mesh.scale.setScalar(s);
                    p.mesh.position.y += dt * 4;
                    if (p.collectAnim >= 1) {
                        this.scene.remove(p.mesh);
                        this.powerups.splice(i, 1);
                        continue;
                    }
                } else {
                    p.mesh.position.y = p.baseY + Math.sin(p.phase) * 0.18;
                }

                if (!p.collected && p.mesh.position.z > this.player.position.z + CONFIG.DESPAWN_BEHIND) {
                    this.scene.remove(p.mesh);
                    this.powerups.splice(i, 1);
                    continue;
                }

                if (!p.collected) {
                    p.box.setFromCenterAndSize(p.mesh.position, tmpVec.set(1.1, 1.1, 1.1));
                }
            }

            // Death-triggered glitch effect (separate from power-up glitch)
            if (this.glitchTriggerTimer > 0) {
                this.glitchTriggerTimer -= dt;
                if (this.glitchTriggerTimer <= 0 && this.activePowerup !== POWERUP_TYPE.GLITCH) {
                    this.glitchPass.enabled = false;
                    this.glitchPass.goWild = false;
                }
            }
        }

        checkCollisions() {
            // Obstacle collisions (skipped if glitch power-up active)
            for (const o of this.obstacles) {
                if (this.playerBox.intersectsBox(o.box)) {
                    if (this.activePowerup === POWERUP_TYPE.GLITCH) {
                        // Phase through — small particle burst
                        this.spawnParticles(o.mesh.position.clone(), 0xff00aa, 8, 4);
                    } else {
                        this.gameOver();
                        return;
                    }
                }
            }
            // Tokens
            for (const t of this.tokensArr) {
                if (t.collected) continue;
                if (this.playerBox.intersectsBox(t.box)) {
                    t.collected = true;
                    this.tokens++;
                    this.combo++;
                    this.comboTimer = 2.5;
                    const value = CONFIG.TOKEN_VALUE * (1 + Math.floor(this.combo / 5));
                    this.score += value;
                    this.shakeIntensity = Math.max(this.shakeIntensity, 0.16);
                    this.fovTarget = CONFIG.FOV_BASE - 2;
                    this.spawnParticles(t.mesh.position.clone(), 0xffaa00, 10, 5);

                    if (this.combo > 0 && this.combo % 5 === 0) this.showCombo(this.combo);
                }
            }
            // Power-ups
            for (const p of this.powerups) {
                if (p.collected) continue;
                if (this.playerBox.intersectsBox(p.box)) {
                    p.collected = true;
                    this.shakeIntensity = Math.max(this.shakeIntensity, 0.3);
                    this.spawnParticles(p.mesh.position.clone(), p.color, 20, 7);
                    this.activatePowerup(p.type);
                }
            }
        }

        showCombo(c) {
            const el = document.getElementById('combo-popup');
            el.textContent = `${c}x COMBO!`;
            el.classList.remove('show');
            void el.offsetWidth;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 800);
        }

        updateCamera(dt) {
            const speedRatio = (this.speed - CONFIG.BASE_SPEED) / (CONFIG.MAX_SPEED - CONFIG.BASE_SPEED);
            const speedFov = CONFIG.FOV_BASE + speedRatio * CONFIG.FOV_SPEED_BOOST;
            const fovDesired = (this.state === STATE.PLAYING)
                ? Math.max(speedFov, this.fovTarget)
                : CONFIG.FOV_BASE;
            const fk = 1 - Math.exp(-4 * dt);
            this.camera.fov += (fovDesired - this.camera.fov) * fk;
            this.fovTarget += (CONFIG.FOV_BASE - this.fovTarget) * (1 - Math.exp(-5 * dt));
            this.camera.updateProjectionMatrix();

            tmpVec.set(
                this.player.position.x * 0.45,
                this.player.position.y + 4.0,
                this.player.position.z + 6.8
            );
            const ck = 1 - Math.exp(-CONFIG.CAMERA_LERP * dt);
            this.camera.position.lerp(tmpVec, ck);

            if (this.shakeIntensity > 0.001) {
                this.camera.position.x += (Math.random() - 0.5) * this.shakeIntensity * 0.55;
                this.camera.position.y += (Math.random() - 0.5) * this.shakeIntensity * 0.45;
                this.shakeIntensity = Math.max(0, this.shakeIntensity - dt * CONFIG.SHAKE_DECAY);
            }

            tmpVec2.set(
                this.player.position.x * 0.5,
                this.player.position.y + 0.6,
                this.player.position.z - 9
            );
            this.cameraLookAt.lerp(tmpVec2, ck);
            this.camera.lookAt(this.cameraLookAt);
        }

        updateWorld(dt) {
            for (const seg of this.pathSegments) {
                if (seg.position.z > this.player.position.z + CONFIG.SEGMENT_LENGTH) {
                    seg.position.z -= CONFIG.SEGMENT_LENGTH * CONFIG.SEGMENT_COUNT;
                }
            }

            this.accentLight.position.x = Math.sin(this.elapsed * 0.7) * 5;
            this.accentLight.position.z = this.player.position.z - 22;

            this.playerLight.position.set(
                this.player.position.x,
                this.player.position.y + 2.2,
                this.player.position.z
            );

            this.dirLight.position.set(
                this.player.position.x + 8,
                18,
                this.player.position.z + 6
            );
            this.dirLight.target.position.copy(this.player.position);
            this.dirLight.target.updateMatrixWorld();
        }

        updateScore(dt) {
            this.score += this.speed * dt * CONFIG.DISTANCE_MULT;
            if (this.comboTimer > 0) {
                this.comboTimer -= dt;
                if (this.comboTimer <= 0) this.combo = 0;
            }
            document.getElementById('score-value').textContent = Math.floor(this.score);
            document.getElementById('token-value').textContent = this.tokens;
            document.getElementById('speed-value').textContent = this.speed.toFixed(1);
        }

        updateDifficulty(dt) {
            if (this.speed < CONFIG.MAX_SPEED) {
                this.speed = Math.min(
                    CONFIG.MAX_SPEED,
                    this.speed + CONFIG.SPEED_GAIN_PER_SEC * dt
                );
            }
        }

        onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            this.camera.aspect = w / h;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(w, h);
            this.composer.setSize(w, h);
            this.bloomPass.setSize(w, h);
        }

        animate() {
            requestAnimationFrame(() => this.animate());
            const dt = Math.min(0.05, this.clock.getDelta());

            // TIME STOP: when active, freeze obstacle/spawning logic
            // Player still moves forward + collects tokens/power-ups
            const timestopActive = this.activePowerup === POWERUP_TYPE.TIMESTOP;

            if (this.state === STATE.PLAYING) {
                this.elapsed += dt;
                this.updatePlayer(dt);

                if (!timestopActive) {
                    // Normal flow: spawn + tick obstacles
                    this.updateSpawning(dt);
                    this.updateObstacles(dt);
                } else {
                    // Time stopped — only refresh boxes (no spawn, no despawn) so collisions still register if player drives into them
                    for (const o of this.obstacles) {
                        tmpVec.copy(o.mesh.position).add(o.offset);
                        o.box.setFromCenterAndSize(tmpVec, o.size);
                    }
                    // Tokens & power-ups still spawn ahead so player can collect during slow-mo
                    while (this.player.position.z - this.lastTokenZ   < CONFIG.SPAWN_AHEAD) this.advanceTokenSpawn();
                    while (this.player.position.z - this.lastPowerupZ < CONFIG.SPAWN_AHEAD) this.advancePowerupSpawn();
                }

                this.updateTokens(dt);
                this.updatePowerups(dt);
                this.checkCollisions();
                this.updateScore(dt);
                this.updateDifficulty(dt);
                this.updateWorld(dt);
            } else if (this.state === STATE.GAME_OVER) {
                this.updateObstacles(dt);
                this.updateTokens(dt);
                this.updatePowerups(dt);
            }

            this.updateParticles(dt);
            this.updateCamera(dt);
            this.composer.render();
        }
    }

    new NeonDriftGame();
    </script>
</body>
</html>
